name: Project Sync

on:
  issues:
    types: [opened, edited, reopened, closed]
  pull_request:
    types: [opened, ready_for_review, reopened, closed, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Add item to ProjectV2 when configured
        uses: actions/github-script@v7
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ vars.PROJECT_STATUS_FIELD_ID }}
          STATUS_INTAKE_OPTION_ID: ${{ vars.PROJECT_STATUS_INTAKE_OPTION_ID }}
          STATUS_IN_REVIEW_OPTION_ID: ${{ vars.PROJECT_STATUS_IN_REVIEW_OPTION_ID }}
          STATUS_DONE_OPTION_ID: ${{ vars.PROJECT_STATUS_DONE_OPTION_ID }}
        with:
          script: |
            const projectId = process.env.PROJECT_ID;
            if (!projectId) {
              core.info('PROJECT_ID not set; skipping project sync.');
              return;
            }

            const isPR = !!context.payload.pull_request;
            const isIssue = !!context.payload.issue && !isPR;
            const contentId = isPR ? context.payload.pull_request.node_id : context.payload.issue.node_id;

            const addMutation = `mutation($project:ID!,$content:ID!){addProjectV2ItemById(input:{projectId:$project,contentId:$content}){item{id}}}`;
            const added = await github.graphql(addMutation, { project: projectId, content: contentId });
            const itemId = added.addProjectV2ItemById.item.id;

            const fieldId = process.env.STATUS_FIELD_ID;
            if (!fieldId) return;

            const event = context.payload.action;
            let optionId = process.env.STATUS_INTAKE_OPTION_ID;
            if (isPR && (event === 'opened' || event === 'ready_for_review' || event === 'synchronize')) optionId = process.env.STATUS_IN_REVIEW_OPTION_ID || optionId;
            if ((isIssue && event === 'closed') || (isPR && event === 'closed')) optionId = process.env.STATUS_DONE_OPTION_ID || optionId;
            if (!optionId) return;

            const upd = `mutation($project:ID!,$item:ID!,$field:ID!,$opt:String!){updateProjectV2ItemFieldValue(input:{projectId:$project,itemId:$item,fieldId:$field,value:{singleSelectOptionId:$opt}}){projectV2Item{id}}}`;
            await github.graphql(upd, { project: projectId, item: itemId, field: fieldId, opt: optionId });
