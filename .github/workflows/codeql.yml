name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '19 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    # Template-safe: only run if repo has real JS/TS source outside workflow/config/docs areas.
    if: ${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  skipped-note:
    if: ${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') == '' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "No JS/TS source files detected; skipping CodeQL for template repository."
