name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Dependency Review
        id: depreview
        uses: actions/dependency-review-action@v4
        continue-on-error: true

      - name: Explain unsupported mode
        if: steps.depreview.outcome == 'failure'
        run: |
          echo "Dependency Review is unsupported on this repository (likely missing GHAS/dependency graph)."
          echo "This template keeps the workflow green by design; consuming repos should enforce this once supported."
